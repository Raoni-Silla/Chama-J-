<div class="container">
  <div class="imagemLogin"></div>

  <div class="flip-container" [class.virado]="etapaVerificacao">
    <div class="flipper">

      <div class="front card-branco">
        <h2>Adicione seu<br /><span>Telefone</span></h2>
        <form>
          <div class="campo">
            <i class="fa fa-phone icon"></i>
            <p-inputMask mask="(99) 99999-9999" id="telefone" name="telefone" placeholder="Telefone"
              [(ngModel)]="telefone"></p-inputMask>
          </div>



          <app-defaultbutton type="btn-entrar" [disabled]="!telefone" (click)="enviarTelefone()">
            Continuar
          </app-defaultbutton>

          <p class="criar-conta">Já tem uma conta? <a routerLink="/login">Logar aqui</a></p>
        </form>
      </div>

      <div class="back card-branco">
        <h2 style="text-align: center;">Verifique o<br /><span>Telefone</span></h2>
        <p class="subtitulo">Enviamos um código para o número<br><strong>{{ telefone || '(00) 00000-0000' }}</strong>
        </p>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; height: 100%;">

          <div class="otp-container">
            <p-inputOtp [(ngModel)]="codigoSms" name="codigoSms" [length]="6"
              [ngModelOptions]="{standalone: true}"></p-inputOtp>
          </div>

          <app-defaultbutton type="btn-entrar" [disabled]="!codigoSms || codigoSms.length !== 6"
            (click)="verificarCodigo()" style="width: 100%;">
            Verificar
          </app-defaultbutton>

          <p-button label="Reenviar codigo" variant="text" severity="warn" size="small" (click)="handleClick()"
            [disabled]="bloqueado" />

          <button type="button" class="btn-reenviar" (click)="voltar()">Editar número de telefone</button>
        </div>
      </div>

    </div>
  </div>
</div>

<p-toast position="top-left"></p-toast>
