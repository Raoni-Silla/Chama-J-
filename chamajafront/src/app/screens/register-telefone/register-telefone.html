<div class="container">
  <div class="imagemLogin"></div>
  <div class="login">
    <h2>Coloque seu numero de <br /><span>telefone</span></h2>
    <form>
      <div class="campo">
        <i class="fa fa-phone icon"></i>
        <input type="user" id="nome" name="nome" placeholder="Preencha o telefone" />
      </div>
      <app-defaultbutton type="btn-entrar">Continuar</app-defaultbutton>
      <p class="criar-conta">Ja tem uma conta? <a href="#">Logar aqui</a></p>
    </form>
  </div>
</div>
